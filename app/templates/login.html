{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:420px;margin:56px auto">
  <h2>Σύνδεση</h2>
  {% if error %}<div class="error">Λάθος username ή password.</div>{% endif %}
  <form method="post" action="/login" class="stacked-form">
    <label class="field">Username
      <input name="username" required autofocus autocomplete="username">
    </label>
    <label class="field">Password
      <input name="password" type="password" required autocomplete="current-password">
    </label>
    <button type="submit">Σύνδεση</button>
  </form>
</div>
{% endblock %}
